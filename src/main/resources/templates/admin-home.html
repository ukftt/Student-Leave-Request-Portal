<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard – Leave Portal</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #f0ebe3;
            --surface: #faf8f5;
            --border: #e2d9ce;
            --brown-dark: #1a0f0a;
            --brown-mid: #3d2314;
            --amber: #c8793a;
            --pending: #d97706;
            --approved: #16a34a;
            --rejected: #dc2626;
            --text-main: #1a0f0a;
            --text-muted: #7a6558;
            --text-light: #b0a098;
            --shadow-sm: 0 1px 3px rgba(26, 15, 10, .06);
            --shadow-md: 0 4px 16px rgba(26, 15, 10, .10);
            --shadow-lg: 0 8px 32px rgba(26, 15, 10, .16);
            --radius: 12px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 32px 36px 48px;
        }

        .top-bar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .page-header .eyebrow {
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 6px;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.7rem, 3vw, 2.4rem);
            font-weight: 800;
            line-height: 1.1;
            color: var(--brown-dark);
        }

        .page-header p {
            margin-top: 5px;
            color: var(--text-muted);
            font-size: .84rem;
        }

        .header-rule {
            width: 44px;
            height: 3px;
            background: var(--amber);
            border-radius: 2px;
            margin-top: 12px;
        }

        .profile-wrap {
            position: relative;
        }

        .profile-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--brown-dark);
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
            font-size: .78rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            min-width: 168px;
            overflow: hidden;
            display: none;
            z-index: 200;
        }

        .dropdown-menu.open {
            display: block;
        }

        .dropdown-header {
            padding: 12px 14px 10px;
            border-bottom: 1px solid var(--border);
        }

        .dropdown-header .d-name {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: .875rem;
        }

        .dropdown-header .d-role {
            font-size: .71rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 14px;
            font-size: .83rem;
            color: var(--text-main);
            text-decoration: none;
        }

        .dropdown-item.logout {
            color: var(--rejected);
            border-top: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 22px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow-sm);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.total {
            background: rgba(200, 121, 58, .12);
            color: var(--amber);
        }

        .stat-icon.pending {
            background: rgba(217, 119, 6, .12);
            color: var(--pending);
        }

        .stat-icon.approved {
            background: rgba(22, 163, 74, .12);
            color: var(--approved);
        }

        .stat-icon.rejected {
            background: rgba(220, 38, 38, .12);
            color: var(--rejected);
        }

        .stat-label {
            font-size: .67rem;
            font-weight: 600;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 252px;
            gap: 18px;
            align-items: start;
        }

        .table-card,
        .activity-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-top,
        .activity-title {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .table-title,
        .activity-title {
            font-family: 'Playfair Display', serif;
            font-size: .98rem;
            font-weight: 700;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .77rem;
        }

        thead tr {
            background: var(--bg);
        }

        thead th {
            padding: 8px 11px;
            text-align: left;
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 9px 11px;
            vertical-align: middle;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .student-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--amber);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: .65rem;
            font-weight: 700;
        }

        .student-name {
            font-weight: 600;
        }

        .student-email {
            font-size: .67rem;
            color: var(--text-muted);
        }

        .leave-badge,
        .status-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 20px;
            font-size: .66rem;
            font-weight: 600;
        }

        .leave-sick {
            background: rgba(220, 38, 38, .08);
            color: #b91c1c;
        }

        .leave-personal {
            background: rgba(99, 102, 241, .08);
            color: #4338ca;
        }

        .leave-casual {
            background: rgba(22, 163, 74, .08);
            color: #15803d;
        }

        .s-pending {
            background: rgba(217, 119, 6, .12);
            color: var(--pending);
        }

        .s-approved {
            background: rgba(22, 163, 74, .12);
            color: var(--approved);
        }

        .s-rejected {
            background: rgba(220, 38, 38, .12);
            color: var(--rejected);
        }

        .action-btns {
            display: flex;
            gap: 4px;
        }

        .btn-approve,
        .btn-reject {
            padding: 4px 8px;
            border-radius: 6px;
            border: none;
            font-size: .7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-approve {
            background: rgba(22, 163, 74, .12);
            color: var(--approved);
        }

        .btn-reject {
            background: rgba(220, 38, 38, .12);
            color: var(--rejected);
        }

        .dash-em {
            color: var(--text-light);
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        .act-icon {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .act-icon.pending {
            background: rgba(217, 119, 6, .10);
        }

        .act-icon.approved {
            background: rgba(22, 163, 74, .10);
        }

        .act-icon.rejected {
            background: rgba(220, 38, 38, .10);
        }

        .act-time {
            font-size: .67rem;
            color: var(--text-light);
            margin-top: 2px;
        }
    </style>

</head>

<body>

    <div class="top-bar">

        <div class="page-header">

            <p class="eyebrow">
                Leave Portal
            </p>

            <h1 th:text="${admin.fullName}">
            </h1>

            <p>
                Welcome back! Here's what's happening today.
            </p>

            <div class="header-rule"></div>

        </div>

        <div class="profile-wrap">

            <button class="profile-btn" id="profileBtn" onclick="toggleDropdown(event)"
                th:text="${#strings.substring(admin.fullName,0,2).toUpperCase()}">
            </button>

            <div class="dropdown-menu" id="dropdownMenu">

                <div class="dropdown-header">

                    <div class="d-name" th:text="${admin.fullName}">
                    </div>

                    <div class="d-role">
                        Administrator
                    </div>

                </div>

                <a href="/admin/profile" class="dropdown-item">Profile</a>
                <a href="/logout" class="dropdown-item logout">

                    Logout

                </a>

            </div>

        </div>

    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <div class="stat-icon total">
                📄
            </div>

            <div>

                <div class="stat-label">
                    Total Requests
                </div>

                <div class="stat-value" th:text="${dashboard.totalRequests}">
                </div>

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-icon pending">
                ⏳
            </div>

            <div>

                <div class="stat-label">
                    Pending
                </div>

                <div class="stat-value" th:text="${dashboard.pendingRequests}">
                </div>

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-icon approved">
                ✅
            </div>

            <div>

                <div class="stat-label">
                    Approved
                </div>

                <div class="stat-value" th:text="${dashboard.approvedRequests}">
                </div>

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-icon rejected">
                ❌
            </div>

            <div>

                <div class="stat-label">
                    Rejected
                </div>

                <div class="stat-value" th:text="${dashboard.rejectedRequests}">
                </div>

            </div>

        </div>

    </div>

    <div class="content-grid">

        <div class="table-card">

            <div class="table-top">

                <div class="table-title">
                    All Leave Requests
                </div>

            </div>

            <div class="table-wrap">

                <table>

                    <thead>

                        <tr>

                            <th>Student</th>
                            <th>Type</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Reason</th>
                            <th>Leaves</th>
                            <th>Status</th>
                            <th>Applied</th>
                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="req : ${dashboard.requests}">

                            <td>

                                <div class="student-info">

                                    <div class="student-avatar"
                                        th:text="${#strings.substring(req.user.fullName,0,2).toUpperCase()}">
                                    </div>

                                    <div>

                                        <div class="student-name" th:text="${req.user.fullName}">
                                        </div>

                                        <div class="student-email" th:text="${req.user.email}">
                                        </div>

                                    </div>

                                </div>

                            </td>

                            <td>

                                <span class="leave-badge" th:text="${req.leaveType}" th:classappend="
                              ${req.leaveType == 'SICK'} ? 'leave-sick' :
                              (${req.leaveType == 'PERSONAL'} ? 'leave-personal' :
                              'leave-casual')">

                                </span>

                            </td>

                            <td th:text="${req.fromDate}">
                            </td>

                            <td th:text="${req.toDate}">
                            </td>

                            <td th:text="${req.reason}">
                            </td>

                            <td>

                                <div class="leaves-col">

                                    7 / 12

                                </div>

                                <div class="leaves-remaining">

                                    Remaining

                                </div>

                            </td>

                            <td>

                                <span class="status-badge" th:text="${req.status}" th:classappend="
                              ${req.status == 'PENDING'} ? 's-pending' :
                              (${req.status == 'APPROVED'} ? 's-approved' :
                              's-rejected')">

                                </span>

                            </td>

                            <td th:text="${req.appliedOn}">
                            </td>

                            <td>

                                <div class="action-btns" th:if="${req.status == 'PENDING'}">

                                    <a th:href="@{/admin/approve/{id}(id=${req.id})}">

                                        <button class="btn-approve">

                                            ✓ Approve

                                        </button>

                                    </a>

                                    <a th:href="@{/admin/reject/{id}(id=${req.id})}">

                                        <button class="btn-reject">

                                            ✕ Reject

                                        </button>

                                    </a>

                                </div>

                                <span class="dash-em" th:unless="${req.status == 'PENDING'}">

                                    —

                                </span>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

        <div class="activity-card">

            <div class="activity-title">
                Recent Activity
            </div>

            <div th:each="activity : ${dashboard.activities}" class="activity-item">

                <div class="act-icon" th:classappend="
                 ${activity.type == 'PENDING'} ? 'pending' :
                 (${activity.type == 'APPROVED'} ? 'approved' :
                 'rejected')">

                </div>

                <div>

                    <div class="act-text" th:text="${activity.message}">
                    </div>

                    <div class="act-time" th:text="${activity.timeAgo}">
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        function toggleDropdown(event) {

            event.stopPropagation();

            document.getElementById('dropdownMenu')
                .classList.toggle('open');

        }

        document.addEventListener('click', function (e) {

            if (!document.querySelector('.profile-wrap')
                .contains(e.target)) {

                document.getElementById('dropdownMenu')
                    .classList.remove('open');

            }

        });

    </script>

</body>

</html>
