<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          th:href="@{/css/style-signup.css}">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg px-5 py-4">

        <div class="container-fluid">

            <a class="navbar-brand logo"
               th:href="@{/}">

                Logo

            </a>

            <div class="d-flex align-items-center gap-5">

                <a class="nav-link custom-link"
                   th:href="@{/}">

                    Portal

                </a>

                <a class="nav-link custom-link"
                   href="#">

                    Apply

                </a>

                <a class="nav-link custom-link"
                   href="#">

                    Records

                </a>

                <a th:href="@{/login}"
                   class="btn signin-btn">

                    Sign in

                </a>

            </div>

        </div>

    </nav>

    <!-- MAIN SECTION -->

    <section class="container-fluid main-section">

        <div class="row align-items-center">

            <!-- LEFT SECTION -->

            <div class="col-lg-5 left-section">

                <p class="welcome-text">
                    CREATE ACCOUNT
                </p>

                <h1 class="main-heading">

                    Begin your
                    portal
                    journey.

                </h1>

                <div class="line"></div>

                <p class="description">

                    Create your account to access
                    leave applications, records and
                    personalized dashboard features.

                </p>

            </div>

            <!-- RIGHT SECTION -->

            <div class="col-lg-6 offset-lg-1">

                <div class="login-card">

                    <form th:action="@{/register}"
                          method="post">

                        <!-- FULL NAME -->

                        <div class="mb-4">

                            <label class="form-label custom-label">
                                Full Name
                            </label>

                            <input type="text"
                                   name="fullName"
                                   class="form-control custom-input"
                                   placeholder="Enter your full name">

                        </div>

                        <!-- EMAIL -->

                        <div class="mb-4">

                            <label class="form-label custom-label">
                                Email address
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control custom-input"
                                   placeholder="Enter your email">

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-4">

                            <label class="form-label custom-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control custom-input"
                                   placeholder="Enter your password">

                        </div>

                        <!-- ROLE -->

                        <div class="mb-5">

                            <label class="form-label custom-label">
                                Role
                            </label>

                            <select name="role"
                                    class="form-select custom-input">

                                <option selected disabled>
                                    Select role
                                </option>

                                <option value="STUDENT">
                                    STUDENT
                                </option>

                                <option value="ADMIN">
                                    ADMIN
                                </option>

                            </select>

                        </div>

                        <!-- BUTTON -->

                        <button type="submit"
                                class="login-btn">

                            CREATE ACCOUNT

                        </button>

                        <!-- DIVIDER -->

                        <div class="divider">

                            <div class="divider-line"></div>

                            <span>OR</span>

                            <div class="divider-line"></div>

                        </div>

                        <!-- FOOTER -->

                        <p class="footer-text">

                            Already have an account?

                            <a th:href="@{/login}">

                                Sign in

                            </a>

                        </p>

                    </form>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
