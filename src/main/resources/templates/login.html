<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" th:href="@{/css/style-login.css}">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg px-5 py-4">

        <div class="container-fluid">

            <a class="navbar-brand logo" href="#">
                Logo
            </a>

            <div class="d-flex align-items-center gap-5">

                <a class="nav-link custom-link" href="#">
                    Portal
                </a>

                <a class="nav-link custom-link" href="#">
                    Apply
                </a>

                <a class="nav-link custom-link" href="#">
                    Records
                </a>

                <button class="signin-btn">
                    Sign in
                </button>

            </div>

        </div>

    </nav>

    <!-- MAIN SECTION -->

    <section class="container-fluid main-section">

        <div class="row align-items-center">

            <!-- LEFT SECTION -->

            <div class="col-lg-5 left-section">

                <p class="welcome-text">
                    WELCOME BACK
                </p>

                <h3 class="main-heading">

                    Sign in to
                    your
                    account.

                </h3>

                <div class="line"></div>

                <p class="description">

                    Access your leave portal to manage
                    applications, track status and stay
                    updated.

                </p>

            </div>

            <!-- RIGHT SECTION -->

            <div class="col-lg-6 offset-lg-1">

                <div class="login-card">

                    <form th:action="@{/authenticate}" method="post">

                        <!-- EMAIL -->

                        <div class="mb-4">

                            <label class="form-label custom-label">
                                Email address
                            </label>

                            <input type="email" name="email" class="form-control custom-input"
                                placeholder="Enter your email">

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-4">

                            <label class="form-label custom-label">
                                Password
                            </label>

                            <input type="password" name="password" class="form-control custom-input"
                                placeholder="Enter your password">

                        </div>

                        <!-- OPTIONS -->

                        <div class="d-flex justify-content-between align-items-center mb-5">

                            <div class="form-check">

                                <input class="form-check-input" type="checkbox">

                                <label class="form-check-label">
                                    Remember me
                                </label>

                            </div>

                            <a href="#" class="forgot-link">

                                Forgot password?

                            </a>

                        </div>

                        
                        <p th:if="${error}" th:text="${error}" style="color: red;
              margin-bottom: 15px;
              font-size: 14px;">

                        </p>
                        <!-- LOGIN BUTTON -->

                        <button type="submit" class="login-btn">

                            SIGN IN

                        </button>

                        <!-- DIVIDER -->

                        <div class="divider">

                            <div class="divider-line"></div>

                            <span>OR</span>

                            <div class="divider-line"></div>

                        </div>

                        <!-- FOOTER -->

                        <p class="footer-text">

                            Don’t have an account?

                            <a href="/signup">
                                Create account
                            </a>

                        </p>

                    </form>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
